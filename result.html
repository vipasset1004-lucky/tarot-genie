<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>타로 리딩 결과 | 팔자연구소 타로 지니</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="result-page">

<nav class="nav scrolled">
  <div class="nav__inner">
    <a href="index.html" class="nav__logo">
      <span class="nav__logo-text">🔮 팔자연구소</span>
      <span class="nav__logo-sub">&nbsp;타로 지니</span>
    </a>
    <a href="index.html" class="btn btn--outline btn--sm">홈으로</a>
  </div>
</nav>

<!-- Loading -->
<div id="loadingState" class="result-container">
  <div class="loading">
    <div class="loading__orb">🔮</div>
    <h3>카드를 해석하고 있습니다</h3>
    <p class="loading__sub">당신만을 위한 리딩을 준비하고 있어요...</p>
    <div class="loading__dots"><span></span><span></span><span></span></div>
    <div class="loading__notice">
      ⏱ <strong>30초 ~ 1분</strong> 정도 걸려요<br>
      <span class="loading__warn">📱 다른 앱으로 이동하지 말고 화면을 켜두세요</span>
      <small>결과는 자동 저장되어 다시 접속하면 볼 수 있어요</small>
    </div>
  </div>
</div>

<!-- Result -->
<div id="resultState" class="result-container" style="display:none;">
  <div class="result-header">
    <span class="big-orb">🔮</span>
    <h1>당신의 <span>타로 리딩</span> 결과</h1>
    <p id="resultSubtitle"></p>
  </div>

  <div class="result-cards-row" id="resultCards"></div>

  <div class="reading-content" id="readingContent"></div>

  <div class="result-actions">
    <button class="btn btn--primary" onclick="window.print()">🖨️ 인쇄하기</button>
    <a href="index.html" class="btn btn--outline">다시 리딩받기</a>
  </div>
</div>

<!-- Error -->
<div id="errorState" class="result-container" style="display:none;">
  <div class="loading">
    <div class="loading__orb" style="font-size:64px;">😔</div>
    <h3>결과를 불러오지 못했습니다</h3>
    <p id="errorMsg"></p>
    <a href="index.html" class="btn btn--primary" style="margin-top:20px;">홈으로 돌아가기</a>
  </div>
</div>

<script>
const POSITIONS = {
  daily:         ['오늘의 메시지'],
  curious:       ['본질', '핵심 흐름', '답'],
  three:         ['과거', '현재', '미래'],
  yearly:        ['상반기 흐름', '하반기 흐름', '올해의 핵심'],
  comprehensive: ['연애/감정', '직업/목표', '재물/금전', '건강/에너지', '종합 조언'],
  celtic:        ['현재 상황','도전/장애물','잠재의식','과거','가능한 미래','단기 미래','나의 태도','외부 영향','희망/두려움','최종 결과'],
  saju:          ['본질적 에너지','현재 운세','사주 보완','관계의 흐름','재물의 흐름','건강/활력','올해 방향','내년 준비','장기 비전','핵심 조언']
};

function renderResult(ctx, sections) {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('resultState').style.display  = 'block';

  document.getElementById('resultSubtitle').textContent =
    `${ctx.userName}님의 ${ctx.product.name} · ${new Date().toLocaleDateString('ko-KR')}`;

  // Cards row
  const cardsRow = document.getElementById('resultCards');
  const positions = POSITIONS[ctx.product.product] || [];
  ctx.selectedCards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'result-tarot-card';
    const imgHtml = card.image
      ? `<div class="result-tarot-card__img-wrap"><img class="result-tarot-card__img${card.isReversed ? ' reversed' : ''}" src="${card.image}" alt="${card.name}" loading="lazy"></div>`
      : `<div class="result-tarot-card__placeholder"><span>✦</span></div>`;
    el.innerHTML = `
      <div class="result-tarot-card__pos">${positions[i] || `카드 ${i+1}`}</div>
      ${imgHtml}
      <div class="result-tarot-card__name">${card.name}</div>
      <div class="result-tarot-card__dir">${card.isReversed ? '역방향 🔄' : '정방향 ↑'}</div>
    `;
    cardsRow.appendChild(el);
  });

  // Reading sections
  const content = document.getElementById('readingContent');
  content.innerHTML = '';
  const sectionList = Array.isArray(sections) ? sections : [{ title: '📖 리딩 결과', paragraphs: [sections] }];
  sectionList.forEach(sec => {
    const div = document.createElement('div');
    div.className = 'reading-section';

    // 카드 분석 섹션 감지 — title에 "카드 N" 패턴 있으면 해당 카드 이미지 삽입
    const cardMatch = (sec.title || '').match(/카드\s*(\d+)/);
    let cardImgHtml = '';
    if (cardMatch) {
      const idx = parseInt(cardMatch[1]) - 1;
      const card = ctx.selectedCards[idx];
      if (card) {
        const imgInner = card.image
          ? `<img class="reading-section__card-img${card.isReversed ? ' reversed' : ''}" src="${card.image}" alt="${card.name}" loading="lazy">`
          : `<div class="reading-section__card-placeholder"><span>✦</span></div>`;
        cardImgHtml = `
          <div class="reading-section__card-img-wrap">
            ${imgInner}
            <div class="reading-section__card-meta">${positions[idx] || ''} · ${card.name} · ${card.isReversed ? '역방향 🔄' : '정방향 ↑'}</div>
          </div>`;
      }
    }

    const paragraphsHtml = (sec.paragraphs || []).map(p =>
      `<p>${p.replace(/\*\*(.*?)\*\*/g, '<strong style="color:var(--gold-light)">$1</strong>')}</p>`
    ).join('');

    div.innerHTML = `<h3>${sec.title}</h3>${cardImgHtml}${paragraphsHtml}`;
    content.appendChild(div);
  });
}

function showError(msg) {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('errorState').style.display  = 'block';
  document.getElementById('errorMsg').textContent = msg;
}

// localStorage 캐싱 (다른 앱 갔다 와도 같은 결과 복원)
const LAST_KEY = 'tarot_last_reading';
const MAX_AGE_MS = 24 * 60 * 60 * 1000; // 24시간

function saveLastReading(ctx, reading) {
  try {
    localStorage.setItem(LAST_KEY, JSON.stringify({ ctx, reading, ts: Date.now() }));
  } catch (e) { /* quota exceeded 등 무시 */ }
}

function loadLastReading() {
  try {
    const raw = localStorage.getItem(LAST_KEY);
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (Date.now() - data.ts > MAX_AGE_MS) {
      localStorage.removeItem(LAST_KEY);
      return null;
    }
    return data;
  } catch { return null; }
}

// Init
window.addEventListener('DOMContentLoaded', async () => {
  const raw = sessionStorage.getItem('tarot_reading_ctx');

  // sessionStorage에 진행 중인 리딩 정보 없으면 → 마지막 캐시된 결과 복원
  if (!raw) {
    const cached = loadLastReading();
    if (cached) {
      renderResult(cached.ctx, cached.reading);
      return;
    }
    showError('리딩 정보를 찾을 수 없습니다. 처음부터 다시 시작해주세요.');
    return;
  }

  const ctx = JSON.parse(raw);

  try {
    const res = await fetch('/api/reading', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        product:       ctx.product,
        selectedCards: ctx.selectedCards,
        userName:      ctx.userName,
        userBirth:     ctx.userBirth,
        userGender:    ctx.userGender,
        userQuestion:  ctx.userQuestion
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `서버 오류 (${res.status})`);
    }

    const data = await res.json();
    sessionStorage.removeItem('tarot_reading_ctx');
    saveLastReading(ctx, data.reading); // 다음 접속 시 복원용 캐싱
    renderResult(ctx, data.reading);
  } catch (err) {
    console.error('Reading API error:', err);
    showError(`리딩을 불러오지 못했습니다: ${err.message}`);
  }
});
</script>
</body>
</html>
